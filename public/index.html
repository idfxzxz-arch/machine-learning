<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AlphaCodes AI</title>
    <link rel="stylesheet" href="/styles.css?v=7" />
  </head>
  <body>
    <svg class="icon-defs" aria-hidden="true">
      <symbol id="icon-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
      <symbol id="icon-send" viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></symbol>
      <symbol id="icon-stop" viewBox="0 0 24 24"><path d="M8 8h8v8H8z"/></symbol>
      <symbol id="icon-trash" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/></symbol>
      <symbol id="icon-copy" viewBox="0 0 24 24"><path d="M8 8h11v11H8z"/><path d="M5 16H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1"/></symbol>
      <symbol id="icon-refresh" viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/></symbol>
      <symbol id="icon-download" viewBox="0 0 24 24"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></symbol>
      <symbol id="icon-settings" viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/><path d="M19.4 15a1.8 1.8 0 0 0 .36 2l.07.07a2 2 0 1 1-2.83 2.83l-.07-.07a1.8 1.8 0 0 0-2-.36 1.8 1.8 0 0 0-1.1 1.65V21a2 2 0 1 1-4 0v-.1A1.8 1.8 0 0 0 8.7 19.3a1.8 1.8 0 0 0-2 .36l-.07.07A2 2 0 1 1 3.8 16.9l.07-.07a1.8 1.8 0 0 0 .36-2 1.8 1.8 0 0 0-1.65-1.1H2.5a2 2 0 1 1 0-4h.1A1.8 1.8 0 0 0 4.2 8.6a1.8 1.8 0 0 0-.36-2l-.07-.07A2 2 0 1 1 6.6 3.7l.07.07a1.8 1.8 0 0 0 2 .36h.03A1.8 1.8 0 0 0 9.8 2.5V2.4a2 2 0 1 1 4 0v.1a1.8 1.8 0 0 0 1.1 1.65 1.8 1.8 0 0 0 2-.36l.07-.07A2 2 0 1 1 19.8 6.5l-.07.07a1.8 1.8 0 0 0-.36 2v.03a1.8 1.8 0 0 0 1.65 1.1h.1a2 2 0 1 1 0 4h-.1A1.8 1.8 0 0 0 19.4 15Z"/></symbol>
      <symbol id="icon-sun" viewBox="0 0 24 24"><path d="M12 4V2"/><path d="M12 22v-2"/><path d="m4.93 4.93-1.41-1.41"/><path d="m20.48 20.48-1.41-1.41"/><path d="M4 12H2"/><path d="M22 12h-2"/><path d="m4.93 19.07-1.41 1.41"/><path d="m20.48 3.52-1.41 1.41"/><path d="M12 17a5 5 0 1 0 0-10 5 5 0 0 0 0 10Z"/></symbol>
      <symbol id="icon-menu" viewBox="0 0 24 24"><path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/></symbol>
      <symbol id="icon-rename" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></symbol>
      <symbol id="icon-close" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></symbol>
    </svg>

    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="brand-row">
          <div class="brand-mark">AC</div>
          <div>
            <div class="brand-name">AlphaCodes</div>
            <div class="brand-subtitle">AI Assistant</div>
          </div>
        </div>

        <button class="primary-action" id="newChatBtn" type="button">
          <svg><use href="#icon-plus"></use></svg>
          <span>Chat baru</span>
        </button>

        <label class="search-box">
          <input id="searchInput" type="search" placeholder="Cari chat" autocomplete="off" />
        </label>

        <div class="section-label">Percakapan</div>
        <nav class="conversation-list" id="conversationList" aria-label="Daftar chat"></nav>

        <div class="sidebar-footer">
          <div class="connection-dot" id="connectionDot"></div>
          <span id="connectionText">Memeriksa koneksi</span>
        </div>
      </aside>

      <main class="chat-panel">
        <header class="topbar">
          <button class="icon-button mobile-only" id="sidebarToggle" type="button" title="Menu" aria-label="Menu">
            <svg><use href="#icon-menu"></use></svg>
          </button>
          <div class="title-wrap">
            <input id="chatTitle" class="chat-title-input" aria-label="Judul chat" />
            <div class="chat-meta" id="chatMeta">AlphaCodes workspace</div>
          </div>
          <div class="top-actions">
            <select id="modelSelect" class="model-select hidden" aria-label="Model AI"></select>
            <button class="icon-button" id="regenerateBtn" type="button" title="Regenerate" aria-label="Regenerate">
              <svg><use href="#icon-refresh"></use></svg>
            </button>
            <button class="icon-button" id="exportBtn" type="button" title="Export" aria-label="Export">
              <svg><use href="#icon-download"></use></svg>
            </button>
            <button class="icon-button" id="themeBtn" type="button" title="Tema" aria-label="Tema">
              <svg><use href="#icon-sun"></use></svg>
            </button>
            <button class="icon-button hidden" id="settingsBtn" type="button" title="Pengaturan" aria-label="Pengaturan">
              <svg><use href="#icon-settings"></use></svg>
            </button>
          </div>
        </header>

        <section class="messages" id="messages" aria-live="polite"></section>

        <footer class="composer-wrap">
          <form class="composer" id="composer">
            <textarea id="promptInput" rows="1" placeholder="Tulis kebutuhan kerja di sini..." autocomplete="off"></textarea>
            <button class="send-button" id="sendBtn" type="submit" aria-label="Kirim">
              <svg><use href="#icon-send"></use></svg>
            </button>
            <button class="send-button hidden" id="stopBtn" type="button" aria-label="Stop">
              <svg><use href="#icon-stop"></use></svg>
            </button>
          </form>
          <div class="status-line" id="statusLine">Siap</div>
        </footer>
      </main>
    </div>

    <div class="overlay hidden" id="settingsOverlay" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="settings-panel">
        <div class="settings-header">
          <h2 id="settingsTitle">Pengaturan</h2>
          <button class="icon-button" id="closeSettingsBtn" type="button" title="Tutup" aria-label="Tutup">
            <svg><use href="#icon-close"></use></svg>
          </button>
        </div>

        <div class="field">
          <label for="manualModelInput">Model</label>
          <input id="manualModelInput" type="text" autocomplete="off" />
        </div>

        <div class="field">
          <label for="systemPromptInput">System prompt</label>
          <textarea id="systemPromptInput" rows="5"></textarea>
        </div>

        <div class="field two-col">
          <label for="temperatureInput">Temperature <span id="temperatureValue">0.7</span></label>
          <input id="temperatureInput" type="range" min="0" max="2" step="0.1" />
        </div>

        <div class="field two-col">
          <label for="topPInput">Top P <span id="topPValue">1</span></label>
          <input id="topPInput" type="range" min="0" max="1" step="0.05" />
        </div>

        <div class="field">
          <label for="maxTokensInput">Max tokens</label>
          <input id="maxTokensInput" type="number" min="1" max="32000" step="1" />
        </div>

        <div class="field">
          <label>Endpoint</label>
          <output id="endpointOutput"></output>
        </div>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script type="module" src="/app.js?v=7"></script>
  </body>
</html>
